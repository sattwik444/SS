<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, minimal-ui" />
    <meta name="description" content="Subway Surfers game" />
    <link rel="icon" href="./NewYorkIcon.png" />
    <style>
        body {
            background-color: #000000;
            margin: 0;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        .fontcache {
            position: fixed;
            margin-left: -100px;
        }

        #og-game-holder {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
        }
    </style>
    <title>Subway Surfers New York | Night Team</title>
    <script src="js/games_lib/ludiAdapter.js" charset="utf-8"></script>
</head>

<body>
    <div id="og-game-holder"></div>

    <!-- Verificación de carga local -->
    <script>
        window.addEventListener("load", function () {
            if (window.location.href.indexOf("file:") === 0) {
                alert("Night Team here! Sadly, this file cannot be opened locally. Run a local HTTP server and open it from there. Good day!");
            } else {
                console.log("Archive loaded correctly from a website!");
            }
        });
    </script>

    <!-- Register Service Worker (handles missing audio gracefully) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/js/sw.js', { scope: '/' })
                .then(reg => console.log('[SW] Registered:', reg.scope))
                .catch(err => console.warn('[SW] Registration failed:', err));
        }
    </script>

    <!-- Scripts del juego (boot.js loads inflate.min.js → vendor.js → main.js in sequence) -->
    <script src="js/boot.js"></script>

    <!-- Hand Gesture Controller (MediaPipe Hands via CDN) -->
    <script src="js/gesture_controller.js"></script>

    <!-- Voice Controller (Web Speech API) -->
    <script src="js/voice_controller.js"></script>
</body>

</html>
